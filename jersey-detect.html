<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phát hiện số áo</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }
    h1 { color: #fff; margin-bottom: 16px; font-size: 20px; }
    .video-container {
      position: relative;
      width: 100%;
      max-width: 400px;
    }
    video {
      width: 100%;
      border-radius: 12px;
      background: #000;
    }
    .result {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 200, 50, 0.9);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 32px;
      font-weight: bold;
      display: none;
    }
    .result.show { display: block; }
    .status {
      color: #888;
      margin-top: 12px;
      font-size: 14px;
    }
    .btn {
      margin-top: 16px;
      padding: 12px 32px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn:disabled { background: #555; }
  </style>
</head>
<body>
  <h1>Phát hiện số áo</h1>
  <div class="video-container">
    <video id="video" autoplay playsinline></video>
    <div id="result" class="result"></div>
  </div>
  <button id="btnStart" class="btn">Bắt đầu Camera</button>
  <div id="status" class="status">Chưa khởi động</div>

  <script>
    const video = document.getElementById('video');
    const result = document.getElementById('result');
    const status = document.getElementById('status');
    const btnStart = document.getElementById('btnStart');

    let worker = null;
    let isProcessing = false;

    async function initOCR() {
      status.textContent = 'Đang tải OCR...';
      worker = await Tesseract.createWorker('eng', 1, {
        logger: m => {
          if (m.status === 'recognizing text') {
            status.textContent = `Đang nhận dạng: ${Math.round(m.progress * 100)}%`;
          }
        }
      });
      status.textContent = 'OCR sẵn sàng';
    }

    async function detectJerseyNumber() {
      if (isProcessing || !worker || video.readyState !== 4) return;

      isProcessing = true;

      try {
        const canvas = document.createElement('canvas');
        const scale = 0.5;
        canvas.width = video.videoWidth * scale;
        canvas.height = video.videoHeight * scale;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const processedCanvas = preprocessWhiteBackground(canvas);
        
        const { data: { text } } = await worker.recognize(processedCanvas);

        const numbers = text.match(/\d+/g);

        if (numbers && numbers.length > 0) {
          const number = numbers[0];
          if (number.length >= 1 && number.length <= 3) {
            result.textContent = `Số áo: ${number}`;
            result.classList.add('show');
            status.textContent = `Đã phát hiện: ${number}`;
          }
        } else {
          result.classList.remove('show');
        }
      } catch (e) {
        console.error(e);
      }

      isProcessing = false;
    }

    function preprocessWhiteBackground(sourceCanvas) {
      const canvas = document.createElement('canvas');
      canvas.width = sourceCanvas.width;
      canvas.height = sourceCanvas.height;
      const ctx = canvas.getContext('2d');
      
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      
      ctx.drawImage(sourceCanvas, 0, 0);
      const srcData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      
      for (let i = 0; i < data.length; i += 4) {
        const r = srcData[i];
        const g = srcData[i + 1];
        const b = srcData[i + 2];
        const gray = (r + g + b) / 3;
        
        if (gray > 180) {
          data[i] = 255;
          data[i + 1] = 255;
          data[i + 2] = 255;
        } else {
          data[i] = 0;
          data[i + 1] = 0;
          data[i + 2] = 0;
        }
      }
      
      ctx.putImageData(imageData, 0, 0);
      return canvas;
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'environment',
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        });
        video.srcObject = stream;

        await initOCR();

        btnStart.disabled = true;
        btnStart.textContent = 'Đang chạy...';

        setInterval(detectJerseyNumber, 1000);
      } catch (e) {
        status.textContent = 'Lỗi camera: ' + e.message;
      }
    }

    btnStart.addEventListener('click', startCamera);
  </script>
</body>
</html>
