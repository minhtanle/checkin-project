<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phát hiện số áo - OpenCV</title>
  <script src="https://docs.opencv.org/4.3.0/opencv.js" async onload="onOpenCvReady()"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }
    h1 { color: #fff; margin-bottom: 16px; font-size: 20px; }
    .video-container {
      position: relative;
      width: 100%;
      max-width: 400px;
    }
    video { width: 100%; border-radius: 12px; background: #000; }
    .result {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 200, 50, 0.9);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 32px;
      font-weight: bold;
      display: none;
    }
    .result.show { display: block; }
    .status { color: #888; margin-top: 12px; font-size: 14px; }
    .btn {
      margin-top: 16px;
      padding: 12px 32px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn:disabled { background: #555; }
  </style>
</head>
<body>
  <h1>Phát hiện số áo</h1>
  <div class="video-container">
    <video id="video" autoplay playsinline></video>
    <div id="result" class="result"></div>
  </div>
  <button id="btnStart" class="btn">Bắt đầu Camera</button>
  <div id="status" class="status">Chờ tải OpenCV...</div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    const video = document.getElementById('video');
    const result = document.getElementById('result');
    const status = document.getElementById('status');
    const btnStart = document.getElementById('btnStart');

    let worker = null;
    let isProcessing = false;
    let isOpenCvReady = false;

    function onOpenCvReady() {
      isOpenCvReady = true;
      status.textContent = 'OpenCV sẵn sàng - Bấm nút để bắt đầu';
    }

    function findNumberRegion(src) {
      const dst = new cv.Mat();
      const gray = new cv.Mat();
      const binary = new cv.Mat();
      
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
      cv.threshold(gray, binary, 0, 255, cv.THRESH_BINARY_INV + cv.THRESH_OTSU);
      
      const contours = new cv.MatVector();
      const hierarchy = new cv.Mat();
      cv.findContours(binary, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
      
      let bestRect = null;
      let bestArea = 0;
      
      for (let i = 0; i < contours.size(); i++) {
        const rect = cv.boundingRect(contours.get(i));
        const aspectRatio = rect.width / rect.height;
        
        if (aspectRatio > 0.2 && aspectRatio < 5 && rect.width > 30 && rect.height > 15) {
          const area = rect.width * rect.height;
          if (area > bestArea) {
            bestArea = area;
            bestRect = rect;
          }
        }
      }
      
      gray.delete(); dst.delete(); binary.delete();
      contours.delete(); hierarchy.delete();
      
      return bestRect;
    }

    async function detectJerseyNumber() {
      if (isProcessing || !worker || !isOpenCvReady || video.readyState !== 4) return;
      
      isProcessing = true;
      
      try {
        const scale = 0.4;
        const w = Math.floor(video.videoWidth * scale);
        const h = Math.floor(video.videoHeight * scale);
        
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, w, h);
        
        const imageData = ctx.getImageData(0, 0, w, h);
        const src = cv.matFromImageData(imageData);
        
        const rect = findNumberRegion(src);
        
        if (rect) {
          const pad = 15;
          let cropX = Math.max(0, rect.x - pad);
          let cropY = Math.max(0, rect.y - pad);
          let cropW = Math.min(src.cols - cropX, rect.width + pad * 2);
          let cropH = Math.min(src.rows - cropY, rect.height + pad * 2);
          
          const crop = src.roi(new cv.Rect(cropX, cropY, cropW, cropH));
          
          const cropCanvas = document.createElement('canvas');
          cropCanvas.width = crop.cols;
          cropCanvas.height = crop.rows;
          const cropCtx = cropCanvas.getContext('2d');
          
          const tempMat = new cv.Mat();
          cv.cvtColor(crop, tempMat, cv.COLOR_RGBA2RGBA, 0);
          const imgData = cropCtx.createImageData(crop.cols, crop.rows);
          imgData.data.set(tempMat.data);
          cropCtx.putImageData(imgData, 0, 0);
          
          const { data: { text } } = await worker.recognize(cropCanvas, 'eng', {
            tessedit_char_whitelist: '0123456789'
          });
          
          const numbers = text.match(/\d+/g);
          
          if (numbers && numbers.length > 0) {
            const number = numbers[0];
            if (number.length >= 1 && number.length <= 3) {
              result.textContent = `Số áo: ${number}`;
              result.classList.add('show');
              status.textContent = `Đã phát hiện: ${number}`;
            }
          }
          
          crop.delete(); tempMat.delete();
        } else {
          result.classList.remove('show');
        }
        
        src.delete();
      } catch (e) {
        console.error(e);
      }
      
      isProcessing = false;
    }

    async function startCamera() {
      if (!isOpenCvReady) {
        status.textContent = 'Vui lòng chờ OpenCV tải xong';
        return;
      }
      
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        video.srcObject = stream;
        
        status.textContent = 'Đang tải OCR...';
        worker = await Tesseract.createWorker('eng', 1, {
          logger: m => {
            if (m.status === 'recognizing text') {
              status.textContent = `Đang nhận dạng: ${Math.round(m.progress * 100)}%`;
            }
          }
        });
        
        status.textContent = 'Đang chạy...';
        btnStart.disabled = true;
        btnStart.textContent = 'Đang chạy...';
        
        setInterval(detectJerseyNumber, 800);
      } catch (e) {
        status.textContent = 'Lỗi: ' + e.message;
      }
    }

    btnStart.addEventListener('click', startCamera);
  </script>
</body>
</html>
