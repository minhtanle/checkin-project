<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scanner</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
    video { width: 100%; max-width: 400px; display: block; margin-bottom: 10px; }
    #result { padding: 15px; margin-top: 15px; border-radius: 5px; }
    #result.success { background: #d4edda; border: 1px solid #28a745; }
    #result.error { background: #f8d7da; border: 1px solid #dc3545; }
    button { padding: 10px 20px; margin: 5px 0; }
  </style>
</head>
<body>
  <h1>QR Scanner</h1>
  
  <button id="btn-camera">Bật Camera</button>
  <video id="video" autoplay playsinline style="display:none"></video>
  <button id="btn-capture" style="display:none">Chụp & Quét</button>
  <button id="btn-stop" style="display:none">Tắt Camera</button>
  
  <hr>
  <p>Hoặc chọn ảnh:</p>
  <input type="file" id="fileInput" accept="image/*">
  
  <div id="result"></div>

  <script type="module">
    const result = document.getElementById('result');
    const fileInput = document.getElementById('fileInput');
    const video = document.getElementById('video');
    const btnCamera = document.getElementById('btn-camera');
    const btnCapture = document.getElementById('btn-capture');
    const btnStop = document.getElementById('btn-stop');

    let stream = null;

    result.textContent = 'Đang tải thư viện...';

    const { readBarcodes } = await import('https://esm.sh/zxing-wasm@3.0.1/reader');

    result.textContent = 'Sẵn sàng';

    // Hàm xử lý QR
    async function processQR(input) {
      result.textContent = 'Đang xử lý...';
      result.className = '';

      try {
        let imageData;
        
        if (input instanceof File) {
          imageData = input;
        } else if (input instanceof HTMLVideoElement) {
          const canvas = new OffscreenCanvas(input.videoWidth, input.videoHeight);
          const ctx = canvas.getContext('2d');
          ctx.drawImage(input, 0, 0);
          imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }

        const results = await readBarcodes(imageData, {
          formats: ['QRCode']
        });

        if (results.length > 0) {
          result.textContent = 'Kết quả: ' + results[0].text;
          result.className = 'success';
        } else {
          result.textContent = 'Không tìm thấy mã QR';
          result.className = 'error';
        }
      } catch (err) {
        result.textContent = 'Lỗi: ' + err.message;
        result.className = 'error';
      }
    }

    // Sự kiện chọn file
    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      await processQR(file);
    });

    // Bật camera
    btnCamera.addEventListener('click', async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: 'environment' } 
        });
        video.srcObject = stream;
        video.style.display = 'block';
        btnCamera.style.display = 'none';
        btnCapture.style.display = 'inline';
        btnStop.style.display = 'inline';
      } catch (err) {
        result.textContent = 'Lỗi camera: ' + err.message;
      }
    });

    // Chụp & quét
    btnCapture.addEventListener('click', () => {
      processQR(video);
    });

    // Tắt camera
    btnStop.addEventListener('click', () => {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      video.style.display = 'none';
      btnCamera.style.display = 'inline';
      btnCapture.style.display = 'none';
      btnStop.style.display = 'none';
    });
  </script>
</body>
</html>
