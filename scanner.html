<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scanner</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
    video { width: 100%; max-width: 400px; display: block; margin-bottom: 10px; }
    #result { padding: 15px; margin-top: 15px; border-radius: 5px; }
    #result.success { background: #d4edda; border: 1px solid #28a745; }
    #result.error { background: #f8d7da; border: 1px solid #dc3545; }
    button { padding: 10px 20px; margin: 5px 0; }
  </style>
</head>
<body>
  <h1>QR Scanner</h1>

  <button id="btn-camera">Mở Camera</button>
  <button id="btn-file">Chọn Ảnh Từ Thư Viện</button>
  <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
  <input type="file" id="fileInput" accept="image/*" style="display:none">

  <div id="result"></div>

  <script type="module">
    const result = document.getElementById('result');
    const cameraInput = document.getElementById('cameraInput');
    const fileInput = document.getElementById('fileInput');
    const btnCamera = document.getElementById('btn-camera');
    const btnFile = document.getElementById('btn-file');

    result.textContent = 'Đang tải thư viện...';

    const { readBarcodes } = await import('https://esm.sh/zxing-wasm@3.0.1/reader');

    result.textContent = 'Sẵn sàng';

    function createCanvas(width, height) {
      if (typeof OffscreenCanvas !== 'undefined') {
        return new OffscreenCanvas(width, height);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      return canvas;
    }

    async function imageDataFromBlob(blob) {
      const bitmap = await createImageBitmap(blob);
      const canvas = createCanvas(bitmap.width, bitmap.height);
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(bitmap, 0, 0);
      bitmap.close();
      return ctx.getImageData(0, 0, canvas.width, canvas.height);
    }

    // Hàm xử lý QR
    async function processQR(input) {
      result.textContent = 'Đang xử lý...';
      result.className = '';

      try {
        let imageData;

        if (input instanceof File || input instanceof Blob) {
          imageData = await imageDataFromBlob(input);
        } else {
          imageData = input;
        }

        const results = await readBarcodes(imageData, {
          formats: ['QRCode']
        });

        if (results.length > 0) {
          result.textContent = 'Kết quả: ' + results[0].text;
          result.className = 'success';
        } else {
          result.textContent = 'Không tìm thấy mã QR';
          result.className = 'error';
        }
      } catch (err) {
        result.textContent = 'Lỗi: ' + err.message;
        result.className = 'error';
      }
    }

    btnCamera.addEventListener('click', () => {
      cameraInput.value = '';
      cameraInput.click();
    });

    btnFile.addEventListener('click', () => {
      fileInput.value = '';
      fileInput.click();
    });

    // Sự kiện chụp ảnh từ camera
    cameraInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      await processQR(file);
    });

    // Sự kiện chọn ảnh từ thư viện
    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      await processQR(file);
    });
  </script>
</body>
</html>
