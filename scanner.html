<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scanner</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
    video { width: 100%; max-width: 400px; display: block; margin-bottom: 10px; }
    #result { padding: 15px; margin-top: 15px; border-radius: 5px; }
    #result.success { background: #d4edda; border: 1px solid #28a745; }
    #result.error { background: #f8d7da; border: 1px solid #dc3545; }
    button { padding: 10px 20px; margin: 5px 0; }
  </style>
</head>
<body>
  <h1>QR Scanner</h1>

  <button id="btn-camera">Bật Camera</button>
  <video id="video" autoplay playsinline style="display:none"></video>
  <button id="btn-capture" style="display:none">Chụp & Quét</button>
  <button id="btn-stop" style="display:none">Tắt Camera</button>

  <hr>
  <p>Hoặc chọn ảnh:</p>
  <button id="btn-file">Chọn Ảnh</button>
  <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">

  <div id="result"></div>

  <script type="module">
    const result = document.getElementById('result');
    const fileInput = document.getElementById('fileInput');
    const video = document.getElementById('video');
    const btnCamera = document.getElementById('btn-camera');
    const btnFile = document.getElementById('btn-file');
    const btnCapture = document.getElementById('btn-capture');
    const btnStop = document.getElementById('btn-stop');

    let stream = null;
    let videoTrack = null;
    let imageCapture = null;

    result.textContent = 'Đang tải thư viện...';

    const { readBarcodes } = await import('https://esm.sh/zxing-wasm@3.0.1/reader');

    result.textContent = 'Sẵn sàng';

    function createCanvas(width, height) {
      if (typeof OffscreenCanvas !== 'undefined') {
        return new OffscreenCanvas(width, height);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      return canvas;
    }

    async function imageDataFromBlob(blob) {
      const bitmap = await createImageBitmap(blob);
      const canvas = createCanvas(bitmap.width, bitmap.height);
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(bitmap, 0, 0);
      bitmap.close();
      return ctx.getImageData(0, 0, canvas.width, canvas.height);
    }

    function imageDataFromVideo(inputVideo) {
      const width = inputVideo.videoWidth || 1280;
      const height = inputVideo.videoHeight || 720;
      const canvas = createCanvas(width, height);
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(inputVideo, 0, 0, width, height);
      return ctx.getImageData(0, 0, width, height);
    }

    async function captureHighQualityFrame() {
      if (imageCapture) {
        const photoBlob = await imageCapture.takePhoto({
          imageWidth: 3840,
          imageHeight: 2160
        });
        return imageDataFromBlob(photoBlob);
      }
      return imageDataFromVideo(video);
    }

    function setCameraUI(isOn) {
      video.style.display = isOn ? 'block' : 'none';
      btnCamera.style.display = isOn ? 'none' : 'inline';
      btnCapture.style.display = isOn ? 'inline' : 'none';
      btnStop.style.display = isOn ? 'inline' : 'none';
      btnFile.disabled = isOn;
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
      stream = null;
      videoTrack = null;
      imageCapture = null;
      video.srcObject = null;
      setCameraUI(false);
    }

    // Hàm xử lý QR
    async function processQR(input) {
      result.textContent = 'Đang xử lý...';
      result.className = '';

      try {
        let imageData;

        if (input instanceof File || input instanceof Blob) {
          imageData = await imageDataFromBlob(input);
        } else if (input instanceof HTMLVideoElement) {
          imageData = imageDataFromVideo(input);
        } else {
          imageData = input;
        }

        const results = await readBarcodes(imageData, {
          formats: ['QRCode']
        });

        if (results.length > 0) {
          result.textContent = 'Kết quả: ' + results[0].text;
          result.className = 'success';
        } else {
          result.textContent = 'Không tìm thấy mã QR';
          result.className = 'error';
        }
      } catch (err) {
        result.textContent = 'Lỗi: ' + err.message;
        result.className = 'error';
      }
    }

    btnFile.addEventListener('click', () => {
      fileInput.value = '';
      fileInput.click();
    });

    // Sự kiện chọn file
    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      stopCamera();
      await processQR(file);
    });

    // Bật camera
    btnCamera.addEventListener('click', async () => {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error('Trình duyệt không hỗ trợ camera.');
        }

        btnCamera.disabled = true;
        stopCamera();

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 3840 },
            height: { ideal: 2160 }
          },
          audio: false
        });

        videoTrack = stream.getVideoTracks()[0] || null;
        if (videoTrack) {
          try {
            await videoTrack.applyConstraints({
              advanced: [
                { focusMode: 'continuous' },
                { sharpness: 1 },
                { exposureMode: 'continuous' }
              ]
            });
          } catch (_) {
            // Bo qua neu thiet bi/trinh duyet khong ho tro tuy chinh nang cao.
          }

          if ('ImageCapture' in window) {
            try {
              imageCapture = new ImageCapture(videoTrack);
            } catch (_) {
              imageCapture = null;
            }
          }
        }

        video.srcObject = stream;
        setCameraUI(true);
      } catch (err) {
        result.textContent = 'Lỗi camera: ' + err.message;
        result.className = 'error';
      } finally {
        btnCamera.disabled = false;
      }
    });

    // Chụp & quét
    btnCapture.addEventListener('click', async () => {
      try {
        const frame = await captureHighQualityFrame();
        await processQR(frame);
      } catch (err) {
        result.textContent = 'Loi chup anh: ' + err.message;
        result.className = 'error';
      }
    });

    // Tắt camera
    btnStop.addEventListener('click', () => {
      stopCamera();
    });
  </script>
</body>
</html>
